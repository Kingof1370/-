name: Build All Apps (CI/CD)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Build ExcelServer
    - name: Restore NuGet Packages (ExcelServer)
      run: dotnet restore ExcelServer/ExcelServer.csproj

    - name: Build ExcelServer (WPF - Self-Contained Single EXE)
      run: |
        dotnet publish ExcelServer/ExcelServer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish-server

    # Build ExcelClient
    - name: Restore NuGet Packages (ExcelClient)
      run: dotnet restore ExcelClient/ExcelClient.csproj

    - name: Build ExcelClient (WPF - Self-Contained Single EXE)
      run: |
        dotnet publish ExcelClient/ExcelClient.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish-client

    # Build Android App
    - name: Install .NET MAUI Workload
      run: dotnet workload install maui-android --ignore-failed-sources --include-previews --allow-unsupported-packages

    - name: Restore NuGet Packages (ExcelClient.Android)
      run: dotnet restore ExcelClient.Android/ExcelClient.Android.csproj -p:CheckEolWorkloads=false -p:CheckEolTargetFrameworks=false

    - name: Build ExcelClient.Android (Unsigned APK)
      run: |
        dotnet publish ExcelClient.Android/ExcelClient.Android.csproj -c Release -f net8.0-android -p:CheckEolWorkloads=false -p:CheckEolTargetFrameworks=false -o publish-android

    # Prepare files for Release
    - name: Prepare Assets
      shell: bash
      run: |
        mkdir -p release-assets
        cp publish-server/ExcelServer.exe release-assets/
        cp publish-client/ExcelClient.exe release-assets/
        cp publish-android/*-Signed.apk release-assets/ExcelClient.apk || cp publish-android/*.apk release-assets/ExcelClient.apk

    # Create GitHub Release with direct static links
    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.0
        name: Release v1.0.0 - Venus Zagros Excel reporting
        draft: false
        prerelease: false
        files: |
          release-assets/ExcelServer.exe
          release-assets/ExcelClient.exe
          release-assets/ExcelClient.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
